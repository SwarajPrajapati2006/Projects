<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bentley Test Drive Request</title>
    <link rel="stylesheet" href="drive.css">

</head>
<body>

<header class="header">
    <div class="logo">BENTLEY</div>
    <nav class="nav">
        <a href="#">Models</a>
        <a href="../lifestyle/lifestyle.html">Lifestyle</a>
        <a href="../index.html">Your Bentley</a>
        <a href="#">About Bentley</a>
        <a href="#" class="active">Request Test Drive</a>
    </nav>
</header>

<main class="main-content">
    <h1>Request a Test Drive</h1>
    <p>Experience Bentley’s perfect blend of luxury and performance.</p>

    <form class="testdrive-form">
        <label>Select your model *</label>
        <select required>
            <option value="">Select Model</option>
            <option>Bentayga</option>
            <option>Flying Spur</option>
            <option>Continental GT</option>
            <option>Continental GTC</option>
        </select>

        <label>Preferred Dealer *</label>
        <input type="text" placeholder="Search by city or zip" required>

        <label>Purchase timeframe</label>
        <select>
            <option>Within 6 months</option>
            <option>6–10 months</option>
            <option>After 10 months</option>
        </select>

        <label>First Name *</label>
        <input type="text" required>

        <label>Last Name *</label>
        <input type="text" required>

        <label>Email *</label>
        <input type="email" required>

        <label>Mobile Number *</label>
        <input type="tel" required>

        <button type="submit">Submit Request</button>
    </form>
</main>

<footer class="footer">
    © Bentley Motors
</footer>

</body>
</html>
